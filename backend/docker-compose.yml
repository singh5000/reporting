version: "3.9"

# =============================================================================
# 360CRD - Enterprise EHS Platform
# Docker Compose - Development Environment
# =============================================================================

networks:
  crd360_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crd360_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crd360_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: crd360_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - crd360_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crd360_user -d crd360_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crd360_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ""
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - crd360_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: crd360_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - crd360_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── API Service ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: ./infrastructure/docker/api.Dockerfile
      target: development
    container_name: crd360_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://crd360_user:strongpassword@postgres:5432/crd360_db?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AWS_S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_S3_BUCKET: crd360-uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crd360_net
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: crd360_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - crd360_net

  # ── PgAdmin (Dev only) ─────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crd360_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@360crd.io
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - crd360_net
    profiles:
      - tools

  # ── Bull Board (Queue Dashboard) ───────────────────────────────────────────
  bull-board:
    image: ghcr.io/felixmosh/bull-board:latest
    container_name: crd360_bull_board
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BULL_BOARD_PASSWORD: admin123
    ports:
      - "3001:3000"
    depends_on:
      - redis
    networks:
      - crd360_net
    profiles:
      - tools
